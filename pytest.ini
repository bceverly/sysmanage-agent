[pytest]
markers =
    integration: marks integration tests (selected by .github/workflows/integration-tests.yml)
filterwarnings =
    # Default: ANY warning is an error so warnings can't scroll off-screen
    # unnoticed. Known third-party warnings we can't fix are re-allowed below
    # (pytest applies the LAST matching filter, so these ignores override the
    # catch-all). Add a targeted ignore only for a warning outside our code.
    error
    # These pytest-internal ignores MUST come before any
    # ``ignore::<external.module>.Warning`` line below.  When that module isn't
    # installed (e.g. coverage on the BSD CI runners), pytest emits a
    # PytestConfigWarning *while applying the filters* — and the ``error``
    # catch-all above would escalate it to a hard failure that aborts the whole
    # run before a single test executes (pytest 9.x).  Ignoring it first makes a
    # missing optional filter module degrade gracefully instead.
    ignore::pytest.PytestConfigWarning
    ignore::pytest.PytestCollectionWarning
    # OpenBSD/NetBSD coverage wheels ship no compiled C tracer; coverage falls
    # back to the pure-Python tracer and warns. The fallback is fine — don't let
    # the warning fail the run on those platforms (inert where the C tracer
    # exists).  If coverage isn't installed at all, the ignore above keeps this
    # line's failed import non-fatal.
    ignore::coverage.exceptions.CoverageWarning
    ignore:.*coroutine.*was never awaited.*:RuntimeWarning
    ignore:.*unawaited coroutine.*:RuntimeWarning
    ignore:.*Enable tracemalloc.*:RuntimeWarning
    ignore:.*imp module is deprecated.*:DeprecationWarning
    ignore:.*distutils.*:DeprecationWarning
    ignore:.*pkg_resources.*:DeprecationWarning
addopts = --tb=short -v