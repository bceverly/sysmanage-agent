name: CI/CD Pipeline

on:
  # Tag-push only.  Day-to-day branch pushes and pull requests are
  # covered by ``multi-os-ci.yml`` (Python 3.12 on
  # ubuntu/macos/windows).  This workflow runs the *exhaustive*
  # Python-version matrix (3.9 through 3.14) plus the full lint
  # suite + coverage badge updates only when an installer is being
  # cut — that's the moment a regression in any of those dimensions
  # actually gates a release.  The same trigger satisfies
  # ``build-and-release.yml``'s wait-on-check step, which polls for
  # these check names against the tag's commit SHA.
  push:
    tags: [ 'v*.*.*', 'v*.*.*.*' ]

permissions:
  contents: read

jobs:
  test-backend:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write  # Allow writing to update README badge
      pull-requests: write  # Allow creating pull requests

    strategy:
      fail-fast: false  # Continue testing other versions even if one fails
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13', '3.14']
        # Python 3.9 included for macOS system Python compatibility

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true  # Allow testing on pre-release Python versions

    - name: Cache pip packages
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          ${{ runner.os }}-pip-

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio

    - name: Run backend tests
      run: |
        python -m pytest tests/ -v -n auto --dist=loadfile --cov=src --cov=main --cov-report=xml --cov-report=term-missing

    - name: Extract coverage percentage
      id: coverage
      run: |
        COVERAGE=$(python -c "
        import xml.etree.ElementTree as ET
        tree = ET.parse('coverage.xml')
        root = tree.getroot()
        coverage = float(root.attrib['line-rate']) * 100
        print(f'{coverage:.0f}')
        ")
        echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
        echo "Coverage: $COVERAGE%"

        # Determine color based on coverage
        if [ $COVERAGE -ge 90 ]; then
          COLOR="brightgreen"
        elif [ $COVERAGE -ge 80 ]; then
          COLOR="green"
        elif [ $COVERAGE -ge 70 ]; then
          COLOR="yellowgreen"
        elif [ $COVERAGE -ge 60 ]; then
          COLOR="yellow"
        elif [ $COVERAGE -ge 40 ]; then
          COLOR="orange"
        else
          COLOR="red"
        fi
        echo "color=$COLOR" >> $GITHUB_OUTPUT
        echo "Badge color: $COLOR"

    - name: Update README badge
      if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push' && matrix.python-version == '3.12'
      run: |
        sed -i "s/test%20coverage-[0-9]*%25-[a-z]*/test%20coverage-${{ steps.coverage.outputs.percentage }}%25-${{ steps.coverage.outputs.color }}/g" README.md

    - name: Create Pull Request for coverage badge update
      if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push' && matrix.python-version == '3.12'
      id: coverage-pr
      uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
      with:
        token: ${{ secrets.AUTO_MERGE_TOKEN }}
        # ``base: main`` is required because this step only runs on
        # tag pushes (per the ``if:`` guard).  The job's initial
        # checkout pulled the tag's commit in detached-HEAD state, so
        # peter-evans can't derive the base from a symbolic ref and
        # errors out with "When the repository is checked out on a
        # commit instead of a branch, the 'base' input must be
        # supplied."  Supplying it explicitly here makes the badge PR
        # target main, which is where the README lives.
        base: main
        commit-message: "Update test coverage badge to ${{ steps.coverage.outputs.percentage }}% [skip ci]"
        title: "Update test coverage badge to ${{ steps.coverage.outputs.percentage }}%"
        body: |
          🔧 **Test Coverage Badge Update**

          - **Coverage**: ${{ steps.coverage.outputs.percentage }}%
          - **Badge Color**: ${{ steps.coverage.outputs.color }}

          Generated automatically by CI pipeline.
        branch: update-coverage-badge-${{ github.run_number }}
        delete-branch: true

    - name: Enable auto-merge for coverage badge PR
      if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push' && matrix.python-version == '3.12' && steps.coverage-pr.outputs.pull-request-number
      run: |
        gh pr merge ${{ steps.coverage-pr.outputs.pull-request-number }} --auto --squash
      env:
        GITHUB_TOKEN: ${{ secrets.AUTO_MERGE_TOKEN }}

    - name: Upload backend coverage to Codecov
      if: matrix.python-version == '3.12'
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
        flags: backend
        name: backend-coverage

  lint-backend:
    name: Backend Linting
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Python 3.12
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Run Black formatter check
      run: |
        python -m black --check --diff src/ tests/

    - name: Run Pylint
      run: |
        python -m pylint src/ --rcfile=.pylintrc

    - name: Run Bandit security scan
      run: |
        # Gate on Medium+High only.
        # B101: assert (used in tests), B404: import subprocess, B608: false positive on shell scripts.
        # B603/B607 (subprocess) are intentionally skipped: this agent's core job is spawning
        # subprocesses, so those checks flood with noise.
        python -m bandit -r src/ -f screen --severity-level medium --skip B101,B404,B603,B607,B608
        # Also generate JSON report for artifacts
        python -m bandit -r src/ -f json -o bandit-report.json --severity-level medium --skip B101,B404,B603,B607,B608 || true

    - name: Upload Bandit results
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
      with:
        name: bandit-security-report
        path: bandit-report.json

    - name: Install project dependencies for Safety scan
      run: |
        pip install -r requirements.txt

    - name: Run Safety scan
      env:
        # Authenticates the scan against the Safety Platform (free account key,
        # stored as a repo secret). Without it `safety scan` falls back to an
        # interactive login and crashes on EOF in CI.
        SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
      run: |
        # Generate the JSON artifact first (|| true so a nonzero exit still uploads the report),
        # then gate on the screen scan.
        safety scan --output json --output-file safety-report.json || true
        safety scan --output screen

    - name: Upload Safety results
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
      if: hashFiles('safety-report.json') != ''
      with:
        name: safety-report
        path: safety-report.json

  build:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    needs: [test-backend, lint-backend]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Python 3.12
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify imports and basic functionality
      run: |
        python -c "import main; print('Imports successful')"
